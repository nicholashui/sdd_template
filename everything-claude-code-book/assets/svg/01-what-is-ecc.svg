<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="540" fill="#f8fafc"/>
  <text x="450" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2933">Everything Claude Code (ECC) — the agent harness operating system</text>
  <text x="450" y="66" text-anchor="middle" font-size="15" fill="#64748b">One reusable operator layer that sits between you and every AI coding tool</text>

  <!-- You -->
  <rect x="60" y="220" width="150" height="90" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="255" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">You</text>
  <text x="135" y="280" text-anchor="middle" font-size="12" fill="#475569">developer +</text>
  <text x="135" y="297" text-anchor="middle" font-size="12" fill="#475569">intent</text>

  <!-- ECC layer -->
  <rect x="300" y="150" width="270" height="240" rx="16" fill="#f0fdfa" stroke="#0d9488" stroke-width="3"/>
  <text x="435" y="182" text-anchor="middle" font-size="19" font-weight="700" fill="#0f766e">ECC operator layer</text>
  <rect x="320" y="200" width="110" height="42" rx="8" fill="#ffffff" stroke="#0d9488"/>
  <text x="375" y="226" text-anchor="middle" font-size="13" fill="#0f766e">64 Agents</text>
  <rect x="440" y="200" width="110" height="42" rx="8" fill="#ffffff" stroke="#0d9488"/>
  <text x="495" y="226" text-anchor="middle" font-size="13" fill="#0f766e">262 Skills</text>
  <rect x="320" y="250" width="110" height="42" rx="8" fill="#ffffff" stroke="#0d9488"/>
  <text x="375" y="276" text-anchor="middle" font-size="13" fill="#0f766e">Hooks</text>
  <rect x="440" y="250" width="110" height="42" rx="8" fill="#ffffff" stroke="#0d9488"/>
  <text x="495" y="276" text-anchor="middle" font-size="13" fill="#0f766e">Rules</text>
  <rect x="320" y="300" width="110" height="42" rx="8" fill="#ffffff" stroke="#0d9488"/>
  <text x="375" y="326" text-anchor="middle" font-size="13" fill="#0f766e">Commands</text>
  <rect x="440" y="300" width="110" height="42" rx="8" fill="#ffffff" stroke="#0d9488"/>
  <text x="495" y="326" text-anchor="middle" font-size="13" fill="#0f766e">MCP config</text>
  <text x="435" y="368" text-anchor="middle" font-size="12" font-style="italic" fill="#475569">memory · security · continuous learning</text>

  <!-- Harnesses -->
  <rect x="660" y="120" width="180" height="44" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="750" y="147" text-anchor="middle" font-size="13" fill="#6d28d9">Claude Code (native)</text>
  <rect x="660" y="172" width="180" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="750" y="197" text-anchor="middle" font-size="13" fill="#6d28d9">Cursor</text>
  <rect x="660" y="220" width="180" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="750" y="245" text-anchor="middle" font-size="13" fill="#6d28d9">Codex (app + CLI)</text>
  <rect x="660" y="268" width="180" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="750" y="293" text-anchor="middle" font-size="13" fill="#6d28d9">OpenCode</text>
  <rect x="660" y="316" width="180" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="750" y="341" text-anchor="middle" font-size="13" fill="#6d28d9">Gemini · Zed · Copilot</text>
  <rect x="660" y="364" width="180" height="40" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="750" y="389" text-anchor="middle" font-size="13" fill="#6d28d9">Qwen · CodeBuddy · …</text>

  <!-- arrows -->
  <line x1="212" y1="265" x2="296" y2="265" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="574" y1="240" x2="656" y2="142" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="574" y1="245" x2="656" y2="192" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="574" y1="255" x2="656" y2="240" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="574" y1="270" x2="656" y2="288" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="574" y1="285" x2="656" y2="336" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="574" y1="300" x2="656" y2="384" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <text x="450" y="470" text-anchor="middle" font-size="14" fill="#475569">Author your workflows once. ECC translates them into each tool's native config format.</text>
  <text x="450" y="496" text-anchor="middle" font-size="13" fill="#94a3b8">MIT-licensed · npm: ecc-universal · plugin id: ecc@ecc · v2.0.0</text>
</svg>
