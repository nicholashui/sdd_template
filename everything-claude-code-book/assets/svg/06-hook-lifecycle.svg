<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a6" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="520" fill="#f8fafc"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">The hook lifecycle across one session</text>
  <text x="450" y="62" text-anchor="middle" font-size="14" fill="#64748b">hooks/hooks.json maps events to Node scripts in scripts/hooks/. Tune with profiles &amp; env vars.</text>

  <!-- timeline -->
  <line x1="70" y1="150" x2="830" y2="150" stroke="#cbd5e1" stroke-width="4"/>

  <!-- SessionStart -->
  <circle cx="120" cy="150" r="9" fill="#2563eb"/>
  <rect x="60" y="170" width="170" height="96" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="145" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">SessionStart</text>
  <text x="145" y="216" text-anchor="middle" font-size="11" fill="#475569">load previous context</text>
  <text x="145" y="232" text-anchor="middle" font-size="11" fill="#475569">detect package manager</text>
  <text x="145" y="248" text-anchor="middle" font-size="11" fill="#475569">inject memory summary</text>

  <!-- PreToolUse -->
  <circle cx="330" cy="150" r="9" fill="#d97706"/>
  <rect x="245" y="60" width="180" height="80" rx="10" fill="#fffbeb" stroke="#d97706"/>
  <text x="335" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">PreToolUse</text>
  <text x="335" y="106" text-anchor="middle" font-size="11" fill="#475569">tmux reminder, push review</text>
  <text x="335" y="122" text-anchor="middle" font-size="11" fill="#475569">secret scan, config guard</text>

  <!-- PostToolUse -->
  <circle cx="470" cy="150" r="9" fill="#16a34a"/>
  <rect x="385" y="170" width="190" height="96" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="480" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">PostToolUse</text>
  <text x="480" y="216" text-anchor="middle" font-size="11" fill="#475569">prettier + tsc typecheck</text>
  <text x="480" y="232" text-anchor="middle" font-size="11" fill="#475569">quality gate, console.log warn</text>
  <text x="480" y="248" text-anchor="middle" font-size="11" fill="#475569">metrics + context monitor</text>

  <!-- PreCompact -->
  <circle cx="650" cy="150" r="9" fill="#7c3aed"/>
  <rect x="565" y="60" width="180" height="80" rx="10" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="655" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">PreCompact</text>
  <text x="655" y="106" text-anchor="middle" font-size="11" fill="#475569">save state before</text>
  <text x="655" y="122" text-anchor="middle" font-size="11" fill="#475569">context is compacted</text>

  <!-- Stop -->
  <circle cx="800" cy="150" r="9" fill="#dc2626"/>
  <rect x="700" y="170" width="170" height="96" rx="10" fill="#fef2f2" stroke="#dc2626"/>
  <text x="785" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Stop (session end)</text>
  <text x="785" y="216" text-anchor="middle" font-size="11" fill="#475569">write session summary</text>
  <text x="785" y="232" text-anchor="middle" font-size="11" fill="#475569">batch format + typecheck</text>
  <text x="785" y="248" text-anchor="middle" font-size="11" fill="#475569">extract learnings</text>

  <line x1="135" y1="150" x2="320" y2="150" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a6)"/>
  <line x1="345" y1="150" x2="460" y2="150" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a6)"/>
  <line x1="485" y1="150" x2="640" y2="150" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a6)"/>
  <line x1="665" y1="150" x2="790" y2="150" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a6)"/>

  <!-- controls -->
  <rect x="60" y="300" width="810" height="170" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="80" y="328" font-size="15" font-weight="700" fill="#1f2933">Runtime controls (no need to edit hook files)</text>
  <text x="80" y="354" font-size="12.5" font-family="monospace" fill="#0f172a">ECC_HOOK_PROFILE=minimal | standard | strict</text>
  <text x="430" y="354" font-size="12" fill="#64748b">strictness profile (default: standard)</text>
  <text x="80" y="378" font-size="12.5" font-family="monospace" fill="#0f172a">ECC_DISABLED_HOOKS="pre:bash:tmux-reminder,post:edit:typecheck"</text>
  <text x="80" y="402" font-size="12.5" font-family="monospace" fill="#0f172a">ECC_SESSION_START_MAX_CHARS=4000   ECC_SESSION_START_CONTEXT=off</text>
  <text x="80" y="426" font-size="12.5" font-family="monospace" fill="#0f172a">ECC_SESSION_RETENTION_DAYS=14      ECC_AGENT_DATA_HOME=~/.cursor/ecc</text>
  <text x="80" y="452" font-size="12" fill="#64748b">Claude Code v2.1+ auto-loads a plugin's hooks/hooks.json — never also declare "hooks" in plugin.json (duplicate error).</text>
</svg>
