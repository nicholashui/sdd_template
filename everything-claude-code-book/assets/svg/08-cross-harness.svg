<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a8" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="540" fill="#f8fafc"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">One source, many harnesses</text>
  <text x="450" y="62" text-anchor="middle" font-size="14" fill="#64748b">AGENTS.md is the universal context file. The installer translates the catalog into each tool's layout.</text>

  <!-- source -->
  <rect x="330" y="86" width="240" height="74" rx="12" fill="#0d9488"/>
  <text x="450" y="116" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">ECC source catalog</text>
  <text x="450" y="138" text-anchor="middle" font-size="11.5" fill="#d1fae5">agents · skills · commands · rules · hooks</text>

  <!-- adapter -->
  <rect x="350" y="190" width="200" height="46" rx="10" fill="#1f2933"/>
  <text x="450" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">installer + adapters</text>
  <line x1="450" y1="160" x2="450" y2="188" stroke="#475569" stroke-width="2" marker-end="url(#a8)"/>

  <!-- harness cards with parity bars -->
  <g>
    <rect x="40" y="280" width="190" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="135" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Claude Code</text>
    <text x="135" y="328" text-anchor="middle" font-size="11.5" fill="#475569">native · full surface</text>
    <text x="135" y="348" text-anchor="middle" font-size="11.5" fill="#475569">64 agents · 262 skills</text>
    <text x="135" y="368" text-anchor="middle" font-size="11.5" fill="#475569">8 hook events · rules</text>
    <text x="135" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">reference target</text>
  </g>
  <g>
    <rect x="245" y="280" width="190" height="110" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="340" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">Cursor</text>
    <text x="340" y="328" text-anchor="middle" font-size="11.5" fill="#475569">.cursor/ + DRY adapter</text>
    <text x="340" y="348" text-anchor="middle" font-size="11.5" fill="#475569">15–20 hook events</text>
    <text x="340" y="368" text-anchor="middle" font-size="11.5" fill="#475569">reuses Claude scripts</text>
    <text x="340" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">more hooks than CC</text>
  </g>
  <g>
    <rect x="450" y="280" width="190" height="110" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="545" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Codex (app+CLI)</text>
    <text x="545" y="328" text-anchor="middle" font-size="11.5" fill="#475569">AGENTS.md + config.toml</text>
    <text x="545" y="348" text-anchor="middle" font-size="11.5" fill="#475569">sync-ecc-to-codex.sh</text>
    <text x="545" y="368" text-anchor="middle" font-size="11.5" fill="#475569">no hooks → instruction</text>
    <text x="545" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">sandbox + approvals</text>
  </g>
  <g>
    <rect x="655" y="280" width="205" height="110" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="757" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">OpenCode</text>
    <text x="757" y="328" text-anchor="middle" font-size="11.5" fill="#475569">.opencode/ plugin</text>
    <text x="757" y="348" text-anchor="middle" font-size="11.5" fill="#475569">11+ event types</text>
    <text x="757" y="368" text-anchor="middle" font-size="11.5" fill="#475569">6 native custom tools</text>
    <text x="757" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">npm: ecc-universal</text>
  </g>

  <line x1="420" y1="236" x2="160" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a8)"/>
  <line x1="440" y1="236" x2="350" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a8)"/>
  <line x1="460" y1="236" x2="545" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a8)"/>
  <line x1="480" y1="236" x2="755" y2="278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a8)"/>

  <!-- also supports -->
  <rect x="40" y="412" width="820" height="96" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="60" y="438" font-size="14" font-weight="700" fill="#1f2933">Also supported (instruction / selective adapters)</text>
  <text x="60" y="462" font-size="13" fill="#475569">Gemini CLI (.gemini) · Zed (.zed) · GitHub Copilot (.github/copilot-instructions.md + prompts) · Antigravity (.agent)</text>
  <text x="60" y="484" font-size="13" fill="#475569">JoyCode / CodeBuddy · Qwen CLI · plus a manual adaptation path for Grok and other non-native interfaces.</text>
  <text x="60" y="503" font-size="12" font-style="italic" fill="#94a3b8">Copilot &amp; Codex lack a hook system, so enforcement there is instruction-based rather than runtime.</text>
</svg>
