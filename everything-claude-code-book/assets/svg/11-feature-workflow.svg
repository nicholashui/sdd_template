<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a11" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="470" fill="#f8fafc"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">Shipping a feature with ECC, end to end</text>
  <text x="450" y="62" text-anchor="middle" font-size="14" fill="#64748b">A concrete loop: plan → test-first → implement → review → verify → learn</text>

  <!-- steps -->
  <g>
    <rect x="40" y="110" width="180" height="84" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="130" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">1 · Plan</text>
    <text x="130" y="160" text-anchor="middle" font-size="11.5" fill="#475569">/plan "add OAuth"</text>
    <text x="130" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">planner agent → plan.md</text>
  </g>
  <g>
    <rect x="250" y="110" width="180" height="84" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
    <text x="340" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">2 · TDD</text>
    <text x="340" y="160" text-anchor="middle" font-size="11.5" fill="#475569">tdd-workflow skill</text>
    <text x="340" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">RED → GREEN → refactor</text>
  </g>
  <g>
    <rect x="460" y="110" width="180" height="84" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="550" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">3 · Review</text>
    <text x="550" y="160" text-anchor="middle" font-size="11.5" fill="#475569">/code-review</text>
    <text x="550" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">+ /security-scan</text>
  </g>
  <g>
    <rect x="670" y="110" width="190" height="84" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="765" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">4 · Verify</text>
    <text x="765" y="160" text-anchor="middle" font-size="11.5" fill="#475569">/quality-gate · /build-fix</text>
    <text x="765" y="178" text-anchor="middle" font-size="11" fill="#94a3b8">/test-coverage ≥ 80%</text>
  </g>

  <line x1="220" y1="152" x2="248" y2="152" stroke="#475569" stroke-width="1.8" marker-end="url(#a11)"/>
  <line x1="430" y1="152" x2="458" y2="152" stroke="#475569" stroke-width="1.8" marker-end="url(#a11)"/>
  <line x1="640" y1="152" x2="668" y2="152" stroke="#475569" stroke-width="1.8" marker-end="url(#a11)"/>

  <!-- hooks layer below -->
  <rect x="40" y="230" width="820" height="58" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="450" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">Hooks run the whole time (invisible): format on save · typecheck · secret scan · context monitor · metrics</text>
  <text x="450" y="276" text-anchor="middle" font-size="12" fill="#854d0e">Rules constrain every step: immutability · file-size limits · no hardcoded secrets · conventional commits</text>

  <!-- learn loop -->
  <rect x="270" y="320" width="360" height="64" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="346" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">5 · Learn &amp; persist</text>
  <text x="450" y="368" text-anchor="middle" font-size="11.5" fill="#475569">/learn-eval → instinct · /save-session · Stop hook writes summary</text>

  <path d="M765,194 C765,330 632,352 632,352" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#a11)"/>
  <path d="M270,352 C150,352 130,260 130,196" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#a11)"/>
  <text x="450" y="410" text-anchor="middle" font-size="12.5" font-style="italic" fill="#64748b">Next feature starts smarter: prior context reloads and learned skills are already available.</text>
  <text x="450" y="436" text-anchor="middle" font-size="12.5" fill="#94a3b8">Use /clear between phases and store intermediate outputs as files to protect the context window.</text>
</svg>
