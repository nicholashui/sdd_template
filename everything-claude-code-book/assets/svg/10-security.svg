<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="560" fill="#f8fafc"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">Agent security: the lethal trifecta &amp; shrinking the blast radius</text>
  <text x="450" y="62" text-anchor="middle" font-size="14" fill="#64748b">Every byte an LLM reads is executable context. Treat skills, configs, and tool output as supply chain.</text>

  <!-- trifecta -->
  <text x="230" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">The lethal trifecta</text>
  <circle cx="170" cy="180" r="62" fill="#fecaca" fill-opacity="0.7" stroke="#dc2626"/>
  <circle cx="290" cy="180" r="62" fill="#fed7aa" fill-opacity="0.7" stroke="#d97706"/>
  <circle cx="230" cy="270" r="62" fill="#ddd6fe" fill-opacity="0.7" stroke="#7c3aed"/>
  <text x="150" y="178" text-anchor="middle" font-size="11.5" font-weight="700" fill="#991b1b">private</text>
  <text x="150" y="194" text-anchor="middle" font-size="11.5" font-weight="700" fill="#991b1b">data</text>
  <text x="312" y="178" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9a3412">untrusted</text>
  <text x="312" y="194" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9a3412">content</text>
  <text x="230" y="286" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5b21b6">external</text>
  <text x="230" y="302" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5b21b6">comms</text>
  <text x="230" y="360" text-anchor="middle" font-size="11.5" fill="#475569">all three in one runtime</text>
  <text x="230" y="378" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b91c1c">= data exfiltration risk</text>

  <!-- defenses -->
  <text x="650" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">Defense in depth</text>
  <rect x="480" y="120" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="500" y="147" font-size="12.5" fill="#166534">1 · Separate identity (agent@…, scoped bot tokens)</text>
  <rect x="480" y="172" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="500" y="199" font-size="12.5" fill="#166534">2 · Isolate (container/VM, network internal:true)</text>
  <rect x="480" y="224" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="500" y="251" font-size="12.5" fill="#166534">3 · Restrict tools/paths (deny ~/.ssh, ~/.aws, .env)</text>
  <rect x="480" y="276" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="500" y="303" font-size="12.5" fill="#166534">4 · Sanitize input (hidden unicode, attachments)</text>
  <rect x="480" y="328" width="360" height="44" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="500" y="355" font-size="12.5" fill="#166534">5 · Approval boundaries + logging + kill switch</text>

  <!-- bottom: tooling + CVEs -->
  <rect x="60" y="420" width="380" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="80" y="446" font-size="14" font-weight="700" fill="#1f2933">AgentShield (ships with ECC)</text>
  <text x="80" y="470" font-size="12" font-family="monospace" fill="#0f172a">npx ecc-agentshield scan</text>
  <text x="80" y="490" font-size="12" font-family="monospace" fill="#0f172a">npx ecc-agentshield scan --fix</text>
  <text x="80" y="510" font-size="12" font-family="monospace" fill="#0f172a">npx ecc-agentshield scan --opus</text>
  <text x="80" y="530" font-size="11.5" fill="#64748b">102 rules · red-team/blue-team/auditor · /security-scan</text>

  <rect x="460" y="420" width="380" height="120" rx="12" fill="#fef2f2" stroke="#dc2626"/>
  <text x="480" y="446" font-size="14" font-weight="700" fill="#b91c1c">Why this is not theoretical</text>
  <text x="480" y="470" font-size="12" fill="#475569">CVE-2025-59536 — code ran before the trust dialog</text>
  <text x="480" y="490" font-size="12" fill="#475569">CVE-2026-21852 — ANTHROPIC_BASE_URL hijack leaks key</text>
  <text x="480" y="510" font-size="12" fill="#475569">Snyk ToxicSkills: 36% of 3,984 skills had injection</text>
  <text x="480" y="530" font-size="11.5" fill="#94a3b8">Project config, hooks &amp; MCP settings are execution surface.</text>
</svg>
