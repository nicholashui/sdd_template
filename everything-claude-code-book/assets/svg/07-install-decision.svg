<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a7" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#f8fafc"/>
  <text x="450" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">Which install path? (pick exactly one)</text>
  <text x="450" y="60" text-anchor="middle" font-size="14" fill="#64748b">Never stack methods — plugin + full installer creates duplicates. Reset before reinstalling.</text>

  <!-- start -->
  <rect x="350" y="80" width="200" height="50" rx="25" fill="#1f2933"/>
  <text x="450" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Start here</text>

  <!-- decision -->
  <polygon points="450,150 600,205 450,260 300,205" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">On Claude Code?</text>
  <text x="450" y="220" text-anchor="middle" font-size="11.5" fill="#475569">want simplest setup?</text>

  <line x1="450" y1="130" x2="450" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#a7)"/>

  <!-- Plugin path -->
  <rect x="120" y="300" width="300" height="120" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="270" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">Plugin path (recommended)</text>
  <text x="140" y="352" font-size="12" font-family="monospace" fill="#0f172a">/plugin marketplace add \</text>
  <text x="150" y="368" font-size="12" font-family="monospace" fill="#0f172a">  https://github.com/affaan-m/ECC</text>
  <text x="140" y="386" font-size="12" font-family="monospace" fill="#0f172a">/plugin install ecc@ecc</text>
  <text x="140" y="408" font-size="11.5" fill="#b45309">then copy rules/ manually (plugins can't ship rules)</text>

  <!-- Manual path -->
  <rect x="480" y="300" width="300" height="120" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="630" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">Manual / CLI path</text>
  <text x="500" y="352" font-size="12" font-family="monospace" fill="#0f172a">npx ecc consult "security reviews"</text>
  <text x="500" y="372" font-size="12" font-family="monospace" fill="#0f172a">./install.sh --profile minimal \</text>
  <text x="510" y="388" font-size="12" font-family="monospace" fill="#0f172a">  --target claude</text>
  <text x="500" y="410" font-size="11.5" fill="#475569">profiles: minimal · core · full   (no hooks in minimal)</text>

  <text x="250" y="284" font-size="13" font-weight="700" fill="#0f766e">YES</text>
  <line x1="380" y1="240" x2="280" y2="298" stroke="#475569" stroke-width="1.8" marker-end="url(#a7)"/>
  <text x="600" y="284" font-size="13" font-weight="700" fill="#6d28d9">want control / plugin broken</text>
  <line x1="520" y1="240" x2="620" y2="298" stroke="#475569" stroke-width="1.8" marker-end="url(#a7)"/>

  <!-- footer reset -->
  <rect x="120" y="448" width="660" height="92" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="140" y="474" font-size="14" font-weight="700" fill="#b91c1c">If things look duplicated / broken — reset, do not reinstall on top</text>
  <text x="140" y="498" font-size="12" font-family="monospace" fill="#0f172a">node scripts/ecc.js list-installed → doctor → repair</text>
  <text x="140" y="518" font-size="12" font-family="monospace" fill="#0f172a">node scripts/uninstall.js --dry-run   then   node scripts/uninstall.js</text>
</svg>
