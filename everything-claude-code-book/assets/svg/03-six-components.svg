<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="560" fill="#f8fafc"/>
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2933">The six building blocks of ECC</text>
  <text x="450" y="64" text-anchor="middle" font-size="14" fill="#64748b">Know these and you understand the whole system</text>

  <!-- Agents -->
  <rect x="40" y="90" width="260" height="130" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="60" y="120" font-size="18" font-weight="700" fill="#1e3a8a">Agents</text>
  <text x="60" y="143" font-size="12.5" fill="#475569">Scoped sub-agents you delegate to.</text>
  <text x="60" y="162" font-size="12.5" fill="#475569">agents/&lt;name&gt;.md with frontmatter:</text>
  <text x="60" y="181" font-size="12" fill="#0f172a" font-family="monospace">name · description · tools · model</text>
  <text x="60" y="204" font-size="12.5" fill="#2563eb">e.g. code-reviewer, planner, tdd-guide</text>

  <!-- Skills -->
  <rect x="320" y="90" width="260" height="130" rx="12" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="340" y="120" font-size="18" font-weight="700" fill="#0f766e">Skills ★</text>
  <text x="340" y="143" font-size="12.5" fill="#475569">The canonical workflow surface.</text>
  <text x="340" y="162" font-size="12.5" fill="#475569">skills/&lt;name&gt;/SKILL.md, frontmatter:</text>
  <text x="340" y="181" font-size="12" fill="#0f172a" font-family="monospace">name · description · origin</text>
  <text x="340" y="204" font-size="12.5" fill="#0d9488">e.g. tdd-workflow, security-review</text>

  <!-- Commands -->
  <rect x="600" y="90" width="260" height="130" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="620" y="120" font-size="18" font-weight="700" fill="#6d28d9">Commands</text>
  <text x="620" y="143" font-size="12.5" fill="#475569">Slash entries you type (/plan).</text>
  <text x="620" y="162" font-size="12.5" fill="#475569">Legacy compatibility layer —</text>
  <text x="620" y="181" font-size="12.5" fill="#475569">durable logic lives in skills now.</text>
  <text x="620" y="204" font-size="12.5" fill="#7c3aed">e.g. /code-review, /build-fix</text>

  <!-- Hooks -->
  <rect x="40" y="240" width="260" height="130" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="60" y="270" font-size="18" font-weight="700" fill="#b45309">Hooks</text>
  <text x="60" y="293" font-size="12.5" fill="#475569">Event-triggered automations.</text>
  <text x="60" y="312" font-size="12.5" fill="#475569">hooks/hooks.json fires Node scripts</text>
  <text x="60" y="331" font-size="12.5" fill="#475569">on tool &amp; session events.</text>
  <text x="60" y="354" font-size="12.5" fill="#d97706">format, gate, persist, learn</text>

  <!-- Rules -->
  <rect x="320" y="240" width="260" height="130" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="340" y="270" font-size="18" font-weight="700" fill="#b91c1c">Rules</text>
  <text x="340" y="293" font-size="12.5" fill="#475569">Always-follow guidelines.</text>
  <text x="340" y="312" font-size="12.5" fill="#475569">rules/common/ + per-language</text>
  <text x="340" y="331" font-size="12.5" fill="#475569">(ts, python, go, swift, php, arkts).</text>
  <text x="340" y="354" font-size="12.5" fill="#dc2626">copy to ~/.claude/rules/ecc/</text>

  <!-- MCP -->
  <rect x="600" y="240" width="260" height="130" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="620" y="270" font-size="18" font-weight="700" fill="#15803d">MCP configs</text>
  <text x="620" y="293" font-size="12.5" fill="#475569">Model Context Protocol servers.</text>
  <text x="620" y="312" font-size="12.5" fill="#475569">mcp-configs/mcp-servers.json</text>
  <text x="620" y="331" font-size="12.5" fill="#475569">connect GitHub, Supabase, etc.</text>
  <text x="620" y="354" font-size="12.5" fill="#16a34a">default connector: chrome-devtools</text>

  <!-- footer band -->
  <rect x="40" y="400" width="820" height="120" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="60" y="428" font-size="15" font-weight="700" fill="#1f2933">How they fit together</text>
  <text x="60" y="452" font-size="13" fill="#475569">• You invoke a <tspan fill="#0d9488" font-weight="700">skill</tspan> (or /command). • The orchestrator may delegate to an <tspan fill="#2563eb" font-weight="700">agent</tspan>.</text>
  <text x="60" y="474" font-size="13" fill="#475569">• <tspan fill="#dc2626" font-weight="700">Rules</tspan> constrain everything; <tspan fill="#d97706" font-weight="700">hooks</tspan> enforce + automate at runtime; <tspan fill="#16a34a" font-weight="700">MCP</tspan> reaches external services.</text>
  <text x="60" y="496" font-size="13" fill="#475569">• Memory hooks and continuous learning feed new skills back into the catalog over time.</text>
</svg>
